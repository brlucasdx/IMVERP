name: Backup Diário — Railway → Google Drive

on:
  schedule:
    - cron: '0 5 * * *'  # 02:00 BRT (UTC-3)
  workflow_dispatch:      # permite rodar manualmente

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar PostgreSQL 17 client
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Instalar rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configurar rclone
        env:
          RCLONE_TOKEN: ${{ secrets.RCLONE_TOKEN }}
        run: |
          mkdir -p ~/.config/rclone
          printf '[IMVERP-BANCO]\ntype = drive\nscope = drive\ntoken = %s\n' "$RCLONE_TOKEN" > ~/.config/rclone/rclone.conf

      - name: Fazer pg_dump do Railway
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_PUBLIC_URL }}
        run: |
          FILENAME="imverp_backup_$(date +'%Y-%m-%d').sql.gz"
          pg_dump "$DATABASE_URL" --no-owner --no-acl | gzip > "$FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Enviar para Google Drive
        run: |
          rclone copy "${{ env.FILENAME }}" "IMVERP-BANCO:Backups/IMVERP/" --progress

      - name: Limpar backups com mais de 30 dias
        run: |
          rclone delete "IMVERP-BANCO:Backups/IMVERP/" \
            --min-age 30d \
            --progress
